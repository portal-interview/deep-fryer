openapi: 3.0.3
info:
  title: Deep Fryer API
  description: Async job processor — drop it in, pull it out golden
  version: 1.0.0
servers:
  - url: https://deep-fryer.flavortown.internal
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /jobs:
    get:
      summary: List jobs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, processing, completed, failed]
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'
    post:
      summary: Submit a new job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
  /jobs/{jobId}:
    get:
      summary: Get job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        queueDepth:
          type: integer
    Job:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [notification, inventory_update, order_completion, receipt_generation]
        status:
          type: string
          enum: [queued, processing, completed, failed]
        payload:
          type: object
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    JobRequest:
      type: object
      properties:
        type:
          type: string
        payload:
          type: object
        priority:
          type: string
          enum: [low, normal, high]
